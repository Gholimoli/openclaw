<svg xmlns="http://www.w3.org/2000/svg" width="5940" height="4200" viewBox="0 0 5940 4200" role="img" aria-labelledby="title desc">
  <title id="title">OpenClaw System Atlas Blueprint A2</title>
  <desc id="desc">Network blueprint style architecture map showing ingress channels, gateway control plane, agent isolation, node execution, storage boundaries, and operations loop.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#07131f"/>
      <stop offset="100%" stop-color="#0a2034"/>
    </linearGradient>
    <pattern id="gridSmall" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#12415e" stroke-width="1" opacity="0.40"/>
    </pattern>
    <pattern id="gridLarge" width="200" height="200" patternUnits="userSpaceOnUse">
      <path d="M200 0H0V200" fill="none" stroke="#1f658d" stroke-width="2" opacity="0.35"/>
    </pattern>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M0,0 L14,7 L0,14 z" fill="#5ac8ff"/>
    </marker>
    <style>
      text { font-family: "IBM Plex Mono", "Courier New", monospace; fill: #d9f4ff; }
      .title { font-size: 132px; font-weight: 700; letter-spacing: 2px; }
      .subtitle { font-size: 46px; fill: #9bd8f6; }
      .layer-title { font-size: 48px; font-weight: 700; fill: #8bd8ff; }
      .node-title { font-size: 34px; font-weight: 700; }
      .node-body { font-size: 26px; fill: #a9dff6; }
      .legend { font-size: 24px; fill: #b6e5ff; }
      .panel { fill: rgba(8,30,47,0.78); stroke: #3cb9ef; stroke-width: 4; rx: 20; }
      .chip { fill: rgba(10,42,63,0.95); stroke: #59c8ff; stroke-width: 3; rx: 14; }
      .thin { stroke: #63ccff; stroke-width: 3; fill: none; }
      .thick { stroke: #5ac8ff; stroke-width: 6; fill: none; }
      .dashed { stroke-dasharray: 16 12; }
      .boundary { stroke: #ff9a5c; stroke-width: 4; stroke-dasharray: 20 14; fill: rgba(255,154,92,0.06); }
    </style>
  </defs>

  <rect width="5940" height="4200" fill="url(#bg)"/>
  <rect width="5940" height="4200" fill="url(#gridSmall)"/>
  <rect width="5940" height="4200" fill="url(#gridLarge)"/>

  <text x="240" y="230" class="title" filter="url(#glow)">OPENCLAW SYSTEM ATLAS</text>
  <text x="245" y="300" class="subtitle">A2 Blueprint | Gateway Control Plane | Trust and Access Boundaries | VPS Operations</text>

  <rect x="190" y="360" width="5560" height="350" class="panel"/>
  <text x="250" y="430" class="layer-title">Layer 1  External ingress channels and operators</text>

  <rect x="250" y="470" width="430" height="180" class="chip"/>
  <text x="285" y="545" class="node-title">WhatsApp</text>
  <text x="285" y="590" class="node-body">core channel ingress</text>

  <rect x="710" y="470" width="430" height="180" class="chip"/>
  <text x="745" y="545" class="node-title">Telegram</text>
  <text x="745" y="590" class="node-body">core channel ingress</text>

  <rect x="1170" y="470" width="430" height="180" class="chip"/>
  <text x="1205" y="545" class="node-title">Discord and Slack</text>
  <text x="1205" y="590" class="node-body">core and plugin ingress</text>

  <rect x="1630" y="470" width="480" height="180" class="chip"/>
  <text x="1665" y="545" class="node-title">Plugin channels</text>
  <text x="1665" y="590" class="node-body">matrix, line, zalo, more</text>

  <rect x="2140" y="470" width="520" height="180" class="chip"/>
  <text x="2175" y="545" class="node-title">Operator clients</text>
  <text x="2175" y="590" class="node-body">Control UI, CLI, macOS app</text>

  <rect x="2690" y="470" width="520" height="180" class="chip"/>
  <text x="2725" y="545" class="node-title">Automation clients</text>
  <text x="2725" y="590" class="node-body">hooks, cron, API callers</text>

  <rect x="3240" y="470" width="460" height="180" class="chip"/>
  <text x="3275" y="545" class="node-title">Node devices</text>
  <text x="3275" y="590" class="node-body">iOS, Android, macOS, headless</text>

  <rect x="3730" y="470" width="520" height="180" class="chip"/>
  <text x="3765" y="545" class="node-title">Model providers</text>
  <text x="3765" y="590" class="node-body">LLM inference backends</text>

  <rect x="4280" y="470" width="520" height="180" class="chip"/>
  <text x="4315" y="545" class="node-title">Git and CI</text>
  <text x="4315" y="590" class="node-body">evolution execution target</text>

  <rect x="4830" y="470" width="860" height="180" class="chip"/>
  <text x="4865" y="545" class="node-title">VidClaw external control center 127.0.0.1:3333</text>
  <text x="4865" y="590" class="node-body">adjacent system, not in process plugin runtime</text>

  <rect x="190" y="760" width="5560" height="760" class="panel"/>
  <text x="250" y="830" class="layer-title">Layer 2  Gateway control plane and protocol gates</text>

  <rect x="360" y="900" width="3340" height="520" class="chip"/>
  <text x="410" y="980" class="node-title">OpenClaw Gateway process  ws and http  :18789</text>
  <text x="410" y="1030" class="node-body">single control plane for channels, operators, nodes, tools, sessions, and evolution</text>

  <rect x="420" y="1085" width="760" height="270" class="chip"/>
  <text x="455" y="1160" class="node-title">Connect handshake</text>
  <text x="455" y="1205" class="node-body">nonce challenge</text>
  <text x="455" y="1245" class="node-body">role validation</text>
  <text x="455" y="1285" class="node-body">protocol negotiation</text>

  <rect x="1230" y="1085" width="760" height="270" class="chip"/>
  <text x="1265" y="1160" class="node-title">Auth and pairing</text>
  <text x="1265" y="1205" class="node-body">token or password gate</text>
  <text x="1265" y="1245" class="node-body">device identity and pairing</text>
  <text x="1265" y="1285" class="node-body">role and scope upgrades</text>

  <rect x="2040" y="1085" width="760" height="270" class="chip"/>
  <text x="2075" y="1160" class="node-title">Method authorization</text>
  <text x="2075" y="1205" class="node-body">operator.read and write</text>
  <text x="2075" y="1245" class="node-body">operator.approvals and pairing</text>
  <text x="2075" y="1285" class="node-body">operator.admin fallback</text>

  <rect x="2850" y="1085" width="760" height="270" class="chip"/>
  <text x="2885" y="1160" class="node-title">Event authorization</text>
  <text x="2885" y="1205" class="node-body">event scope guards</text>
  <text x="2885" y="1245" class="node-body">slow consumer protection</text>
  <text x="2885" y="1285" class="node-body">presence and office streams</text>

  <rect x="3790" y="900" width="1860" height="520" class="chip"/>
  <text x="3840" y="980" class="node-title">Control and adjacent surfaces</text>
  <text x="3840" y="1030" class="node-body">Control UI served by Gateway root path</text>
  <text x="3840" y="1080" class="node-body">tools invoke and openresponses endpoints</text>
  <text x="3840" y="1130" class="node-body">VidClaw reads state and workspace through loopback API and filesystem</text>
  <text x="3840" y="1180" class="node-body">Tailscale Serve or SSH tunnel for private remote operator access</text>

  <path d="M680 710 L680 900" class="thick" marker-end="url(#arrow)"/>
  <path d="M925 710 L925 900" class="thick" marker-end="url(#arrow)"/>
  <path d="M1385 710 L1385 900" class="thick" marker-end="url(#arrow)"/>
  <path d="M1870 710 L1870 900" class="thick" marker-end="url(#arrow)"/>
  <path d="M2400 710 L2400 900" class="thick" marker-end="url(#arrow)"/>
  <path d="M2950 710 L2950 900" class="thick" marker-end="url(#arrow)"/>
  <path d="M3470 710 L3470 900" class="thick" marker-end="url(#arrow)"/>
  <path d="M3990 710 L3990 900" class="thick" marker-end="url(#arrow)"/>
  <path d="M4540 710 L4540 900" class="thick" marker-end="url(#arrow)"/>
  <path d="M5230 710 L5230 900" class="thick" marker-end="url(#arrow)"/>

  <rect x="190" y="1570" width="5560" height="620" class="panel"/>
  <text x="250" y="1640" class="layer-title">Layer 3  Agent isolation and tool boundaries</text>

  <rect x="280" y="1730" width="1320" height="390" class="chip"/>
  <text x="335" y="1805" class="node-title">Agent main</text>
  <text x="335" y="1850" class="node-body">chat and routing, minimal tools</text>
  <text x="335" y="1890" class="node-body">subagent delegation to coder and power</text>
  <text x="335" y="1930" class="node-body">low blast radius by default</text>

  <rect x="1660" y="1730" width="1320" height="390" class="chip"/>
  <text x="1715" y="1805" class="node-title">Agent coder</text>
  <text x="1715" y="1850" class="node-body">sandbox mode all, workspace rw</text>
  <text x="1715" y="1890" class="node-body">exec, process, read, write, edit, apply_patch</text>
  <text x="1715" y="1930" class="node-body">deterministic work plugin execution</text>

  <rect x="3040" y="1730" width="1320" height="390" class="chip"/>
  <text x="3095" y="1805" class="node-title">Agent power</text>
  <text x="3095" y="1850" class="node-body">browser plus exec with approvals</text>
  <text x="3095" y="1890" class="node-body">read only for filesystem mutation paths</text>
  <text x="3095" y="1930" class="node-body">high trust operator path</text>

  <rect x="4420" y="1730" width="1240" height="390" class="chip"/>
  <text x="4475" y="1805" class="node-title">Agent ops</text>
  <text x="4475" y="1850" class="node-body">maintenance profile and status checks</text>
  <text x="4475" y="1890" class="node-body">normally disabled or heavily constrained</text>
  <text x="4475" y="1930" class="node-body">separate intent and session context</text>

  <path d="M1600 1925 L1660 1925" class="thin" marker-end="url(#arrow)"/>
  <path d="M2980 1925 L3040 1925" class="thin" marker-end="url(#arrow)"/>
  <path d="M4360 1925 L4420 1925" class="thin" marker-end="url(#arrow)"/>

  <rect x="190" y="2240" width="5560" height="760" class="panel"/>
  <text x="250" y="2310" class="layer-title">Layer 4  Node execution plane and approvals interlocks</text>

  <rect x="280" y="2390" width="1720" height="500" class="chip"/>
  <text x="335" y="2465" class="node-title">Node hosts</text>
  <text x="335" y="2510" class="node-body">iOS and Android capability nodes</text>
  <text x="335" y="2550" class="node-body">macOS node mode and headless system.run nodes</text>
  <text x="335" y="2590" class="node-body">paired via role node with command and permission claims</text>

  <rect x="2070" y="2390" width="1720" height="500" class="chip"/>
  <text x="2125" y="2465" class="node-title">Execution gate chain</text>
  <text x="2125" y="2510" class="node-body">tool policy gate then sandbox placement then host selection</text>
  <text x="2125" y="2550" class="node-body">exec approvals allowlist ask fallback and decision events</text>
  <text x="2125" y="2590" class="node-body">deny and timeout terminate execution path</text>

  <rect x="3860" y="2390" width="1790" height="500" class="chip"/>
  <text x="3915" y="2465" class="node-title">Approval resolution surfaces</text>
  <text x="3915" y="2510" class="node-body">Control UI exec approval cards</text>
  <text x="3915" y="2550" class="node-body">chat forwarded approvals with approve command</text>
  <text x="3915" y="2590" class="node-body">node local store ~/.openclaw/exec-approvals.json</text>

  <path d="M2000 2640 L2070 2640" class="thick" marker-end="url(#arrow)"/>
  <path d="M3790 2640 L3860 2640" class="thick" marker-end="url(#arrow)"/>

  <rect x="190" y="3050" width="5560" height="820" class="panel"/>
  <text x="250" y="3120" class="layer-title">Layer 5 and 6  State boundaries and VPS operations loop</text>

  <rect x="280" y="3200" width="2400" height="600" class="chip"/>
  <text x="335" y="3275" class="node-title">State and secrets boundary</text>
  <text x="335" y="3320" class="node-body">~/.openclaw/openclaw.json   config source of truth</text>
  <text x="335" y="3360" class="node-body">~/.openclaw/credentials      channel and pairing data</text>
  <text x="335" y="3400" class="node-body">~/.openclaw/agents/*/agent   auth profiles and model state</text>
  <text x="335" y="3440" class="node-body">~/.openclaw/agents/*/sessions transcripts and session index</text>
  <text x="335" y="3480" class="node-body">~/.openclaw/workspace*       operator controlled working files</text>
  <text x="335" y="3520" class="node-body">backup boundary includes state plus workspace plus release metadata</text>

  <rect x="2750" y="3200" width="2900" height="600" class="chip"/>
  <text x="2810" y="3275" class="node-title">VPS release operations loop</text>
  <text x="2810" y="3320" class="node-body">1 build candidate release directory</text>
  <text x="2810" y="3360" class="node-body">2 preflight real gateway boot on loopback test port</text>
  <text x="2810" y="3400" class="node-body">3 promote live symlink and restart service</text>
  <text x="2810" y="3440" class="node-body">4 run channels status probe and security audit deep</text>
  <text x="2810" y="3480" class="node-body">5 hold stability window, check restart count, then mark last known good</text>
  <text x="2810" y="3520" class="node-body">6 rollback by repointing symlink and reprobing if instability occurs</text>

  <path d="M2680 3500 L2750 3500" class="thick" marker-end="url(#arrow)"/>

  <rect x="180" y="350" width="5580" height="3550" class="boundary"/>
  <text x="5040" y="3960" class="legend">Trust boundary of Gateway host and local state</text>

  <rect x="4200" y="320" width="1540" height="370" class="panel"/>
  <text x="4260" y="400" class="layer-title">Legend</text>
  <line x1="4270" y1="460" x2="4410" y2="460" class="thick" marker-end="url(#arrow)"/>
  <text x="4450" y="470" class="legend">Primary control or data flow</text>
  <line x1="4270" y1="520" x2="4410" y2="520" class="thin dashed"/>
  <text x="4450" y="530" class="legend">Secondary relation or dependency</text>
  <rect x="4270" y="565" width="120" height="60" class="chip"/>
  <text x="4450" y="606" class="legend">Service or subsystem node</text>
  <rect x="4270" y="640" width="120" height="38" class="boundary"/>
  <text x="4450" y="670" class="legend">Explicit trust boundary</text>
</svg>
