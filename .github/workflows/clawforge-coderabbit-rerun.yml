name: ClawForge CodeRabbit rerun

on:
  pull_request_target:
    types: [opened, reopened, synchronize]

concurrency:
  group: clawforge-coderabbit-rerun-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  request_rerun:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Post canonical rerun request (SHA dedupe)
        uses: actions/github-script@v7
        with:
          script: |
            const marker = "<!-- clawforge-coderabbit-auto-rerun -->";
            const headSha = String(context.payload.pull_request?.head?.sha || "");
            const issueNumber = Number(context.payload.pull_request?.number || 0);
            if (!headSha || !issueNumber) {
              core.setFailed("Missing pull_request head sha or number in event payload.");
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const trigger = `sha:${headSha}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: issueNumber,
              per_page: 100,
            });

            const alreadyRequested = (comments || []).some((c) => {
              const body = typeof c?.body === "string" ? c.body : "";
              return body.includes(marker) && body.includes(trigger);
            });

            if (alreadyRequested) {
              core.info(`Rerun request already posted for ${trigger}`);
              return;
            }

            const body = `${marker}
            @coderabbitai review
            ${trigger}`.replace(/^ +/gm, "");

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issueNumber,
              body,
            });
